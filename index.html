<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIX SIX이들 주루마블</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        #dice {
            width: 140px;
            height: 140px;
            background-color: white;
            border: 6px solid black;
            border-radius: 20px;
            margin: 20px;
            cursor: pointer;
            user-select: none;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.15);
        }

        .dot {
            width: 24px;
            height: 24px;
            background-color: black;
            border-radius: 50%;
            justify-self: center;
            align-self: center;
            visibility: hidden;
        }

        .dot.red {
            background-color: #ff4757;
            width: 34px;
            height: 34px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #4facfe;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover { background-color: #00f2fe; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }
        
        /* 주사위 흔들림 애니메이션 속도 단축 (0.4s -> 0.2s) */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-2px, -2px) rotate(-5deg); }
            40% { transform: translate(2px, -2px) rotate(5deg); }
            60% { transform: translate(-2px, 2px) rotate(-5deg); }
            80% { transform: translate(2px, -2px) rotate(5deg); }
            100% { transform: translate(2px, 2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <h1>SIX SIX이들 주루마블 🎲</h1>
    
    <div id="dice">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
        <div class="dot" id="dot-4"></div>
        <div class="dot" id="dot-5"></div>
        <div class="dot" id="dot-6"></div>
        <div class="dot" id="dot-7"></div>
        <div class="dot" id="dot-8"></div>
    </div>
    
    <button id="rollButton">주사위 굴리기</button>

    <script>
        const diceElement = document.getElementById('dice');
        const rollButton = document.getElementById('rollButton');

        const dicePatterns = {
            1: [4],
            2: [2, 6],
            3: [2, 4, 6],
            4: [0, 2, 6, 8],
            5: [0, 2, 4, 6, 8],
            6: [0, 2, 3, 5, 6, 8]
        };

        function drawDice(num) {
            for (let i = 0; i < 9; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.style.visibility = 'hidden';
                dot.classList.remove('red');
            }
            
            dicePatterns[num].forEach(index => {
                const dot = document.getElementById(`dot-${index}`);
                dot.style.visibility = 'visible';
                
                if (num === 1) {
                    dot.classList.add('red');
                }
            });
        }

        function rollDice() {
            rollButton.disabled = true;
            diceElement.classList.add('shake');

            // 눈이 바뀌는 간격 절반으로 단축 (100ms -> 50ms)
            let rollInterval = setInterval(() => {
                const randomFace = Math.floor(Math.random() * 6) + 1;
                drawDice(randomFace);
            }, 50);

            // 최종 멈추는 시간 절반으로 단축 (1000ms -> 500ms)
            setTimeout(() => {
                clearInterval(rollInterval);
                diceElement.classList.remove('shake');
                
                // 1부터 6까지 정확히 1/6 확률로 난수 생성
                const finalResult = Math.floor(Math.random() * 6) + 1;
                drawDice(finalResult);
                
                rollButton.disabled = false;
            }, 500);
        }

        drawDice(1);

        rollButton.addEventListener('click', rollDice);
        diceElement.addEventListener('click', rollDice);
    </script>

</body>
</html>
